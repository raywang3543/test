<h2>图标背景色</h2>

<style>
  .icon-grid {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    margin: 32px 0;
  }
  .icon-card {
    background: #fff;
    border: 2.5px solid #0E0E12;
    border-radius: 20px;
    padding: 24px 20px 18px;
    width: 160px;
    cursor: pointer;
    box-shadow: 5px 5px 0 #0E0E12;
    transition: transform 0.1s, box-shadow 0.1s;
    text-align: center;
  }
  .icon-card:hover { transform: translate(-2px,-2px); box-shadow: 7px 7px 0 #0E0E12; }
  .icon-preview {
    width: 96px;
    height: 96px;
    margin: 0 auto 14px;
    border-radius: 22px;
    border: 2.5px solid #0E0E12;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .icon-card h3 { font-size: 14px; font-weight: 700; margin: 0 0 5px; color: #0E0E12; }
  .icon-card p { font-size: 11px; color: #7A7A85; margin: 0; line-height: 1.4; }
  .kw { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-top: 8px; border: 1.5px solid #0E0E12; }

  .hearts-wrap { position: relative; width: 68px; height: 60px; }
  .h-left { position: absolute; left: 0; top: 6px; width: 44px; height: 38px; }
  .h-right { position: absolute; right: 0; top: 0; width: 44px; height: 38px; }
  .h-left svg, .h-right svg { width: 100%; height: 100%; }
  .deco { position: absolute; font-weight: 900; }
</style>
