<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵犀 Splash - Design Variants</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Base Y2K Tokens */
            --y2k-bg: #FFF5E1;
            --y2k-ink: #0E0E12;
            --y2k-pink: #FF5EA8;
            --y2k-lime: #C6FF3D;
            --y2k-blue: #3D6BFF;
            --y2k-gold: #FFB800;
            
            /* Variant: Minimal */
            --min-bg: #FAFAF8;
            --min-ink: #1a1a1a;
            --min-accent: #e8e8e3;
            
            /* Variant: Dark Neon */
            --neon-bg: #0a0a0f;
            --neon-ink: #ffffff;
            --neon-pink: #ff00ff;
            --neon-cyan: #00ffff;
            --neon-purple: #b026ff;
            
            /* Variant: Fluid */
            --fluid-bg: #f0f4f8;
            --fluid-ink: #1e293b;
            --fluid-coral: #ff6b6b;
            --fluid-teal: #4ecdc4;
            --fluid-lavender: #a8a4e6;
            
            /* Variant: Brutalist */
            --brut-bg: #ff0000;
            --brut-ink: #000000;
            --brut-accent: #ffff00;
            --brut-white: #ffffff;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            overflow: hidden;
        }
        
        /* Device Frame */
        .device-frame {
            width: 375px;
            height: 812px;
            background: var(--current-bg, var(--y2k-bg));
            border-radius: 40px;
            border: 12px solid #2a2a2a;
            position: relative;
            overflow: hidden;
            margin: 40px auto;
            box-shadow: 0 25px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.1);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .device-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 30px;
            background: #2a2a2a;
            border-radius: 0 0 20px 20px;
            z-index: 100;
        }
        
        /* Variant: Y2K */
        .variant-y2k { --current-bg: var(--y2k-bg); }
        
        /* Variant: Minimal */
        .variant-minimal { --current-bg: var(--min-bg); }
        
        /* Variant: Dark Neon */
        .variant-neon { --current-bg: var(--neon-bg); }
        
        /* Variant: Fluid */
        .variant-fluid { --current-bg: var(--fluid-bg); }
        
        /* Variant: Brutalist */
        .variant-brutalist { --current-bg: var(--brut-bg); }
        
        /* Splash Content Container */
        .splash-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 40px;
        }
        
        /* ===== Y2K STYLE ===== */
        .y2k-icon {
            width: 72px;
            height: 72px;
            background: var(--y2k-lime);
            border-radius: 20px;
            border: 2px solid var(--y2k-ink);
            box-shadow: 4px 4px 0 var(--y2k-ink);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 36px;
        }
        
        .y2k-icon svg { width: 36px; height: 36px; }
        
        .y2k-title {
            font-size: 52px;
            font-weight: 900;
            letter-spacing: -2px;
            color: var(--y2k-ink);
            line-height: 1;
            margin-bottom: 12px;
        }
        
        .y2k-subtitle {
            font-family: monospace;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--y2k-ink);
            opacity: 0.5;
        }
        
        .y2k-progress {
            width: 120px;
            height: 3px;
            background: var(--y2k-ink);
            opacity: 0.08;
            border-radius: 2px;
            margin-top: auto;
            margin-bottom: 48px;
            overflow: hidden;
        }
        
        .y2k-progress-bar {
            height: 100%;
            background: var(--y2k-pink);
            border-radius: 2px;
            animation: progressGrow 1s ease-out 1.4s both;
        }
        
        /* ===== MINIMAL STYLE ===== */
        .minimal-icon {
            width: 48px;
            height: 48px;
            border: 1.5px solid var(--min-ink);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 48px;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.3s both;
        }
        
        .minimal-title {
            font-size: 42px;
            font-weight: 300;
            letter-spacing: 8px;
            color: var(--min-ink);
            text-transform: uppercase;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.6s both;
        }
        
        .minimal-line {
            width: 40px;
            height: 1px;
            background: var(--min-ink);
            margin: 24px 0;
            opacity: 0;
            animation: expandWidth 0.6s ease-out 0.9s both;
        }
        
        .minimal-subtitle {
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 4px;
            color: var(--min-ink);
            opacity: 0.4;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 1.2s both;
        }
        
        .minimal-loader {
            margin-top: auto;
            margin-bottom: 48px;
            width: 24px;
            height: 24px;
            border: 1px solid var(--min-accent);
            border-top-color: var(--min-ink);
            border-radius: 50%;
            opacity: 0;
            animation: fadeIn 0.4s ease-out 1.5s both, spin 1s linear infinite;
        }
        
        /* ===== NEON STYLE ===== */
        .neon-icon {
            width: 80px;
            height: 80px;
            border: 2px solid var(--neon-cyan);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            box-shadow: 0 0 20px var(--neon-cyan), inset 0 0 20px rgba(0,255,255,0.1);
            animation: neonPulse 2s ease-in-out infinite;
        }
        
        .neon-icon svg {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 8px var(--neon-cyan));
        }
        
        .neon-title {
            font-size: 56px;
            font-weight: 900;
            letter-spacing: 6px;
            color: var(--neon-ink);
            text-shadow: 0 0 20px var(--neon-pink), 0 0 40px var(--neon-pink);
            margin-bottom: 16px;
            animation: neonFlicker 3s ease-in-out infinite;
        }
        
        .neon-subtitle {
            font-family: monospace;
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
            opacity: 0.8;
        }
        
        .neon-grid {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 200px;
            background: 
                linear-gradient(to top, rgba(0,255,255,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,255,0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: bottom;
            animation: neonGridMove 4s linear infinite;
        }
        
        .neon-progress {
            margin-top: auto;
            margin-bottom: 48px;
            width: 150px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .neon-progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 60%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
            box-shadow: 0 0 10px var(--neon-cyan);
            animation: neonProgress 2s ease-out 1s both;
        }
        
        /* ===== FLUID STYLE ===== */
        .fluid-bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.6;
            animation: fluidFloat 8s ease-in-out infinite;
        }
        
        .fluid-shape-1 {
            width: 300px;
            height: 300px;
            background: var(--fluid-coral);
            top: -50px;
            right: -80px;
            animation-delay: 0s;
        }
        
        .fluid-shape-2 {
            width: 250px;
            height: 250px;
            background: var(--fluid-teal);
            bottom: 100px;
            left: -60px;
            animation-delay: -2s;
        }
        
        .fluid-shape-3 {
            width: 200px;
            height: 200px;
            background: var(--fluid-lavender);
            bottom: -40px;
            right: 40px;
            animation-delay: -4s;
        }
        
        .fluid-icon {
            width: 64px;
            height: 64px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 36px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            animation: fluidIcon 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
        }
        
        .fluid-title {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--fluid-ink);
            animation: fluidSlideUp 0.8s ease-out 0.5s both;
        }
        
        .fluid-subtitle {
            font-size: 13px;
            font-weight: 500;
            color: var(--fluid-ink);
            opacity: 0.5;
            margin-top: 12px;
            animation: fluidSlideUp 0.8s ease-out 0.7s both;
        }
        
        .fluid-progress {
            margin-top: auto;
            margin-bottom: 48px;
            width: 100px;
            height: 4px;
            background: rgba(0,0,0,0.05);
            border-radius: 2px;
            overflow: hidden;
            animation: fluidSlideUp 0.6s ease-out 0.9s both;
        }
        
        .fluid-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--fluid-coral), var(--fluid-teal));
            border-radius: 2px;
            animation: progressGrow 1.2s ease-out 1.4s both;
        }
        
        /* ===== BRUTALIST STYLE ===== */
        .brut-icon {
            width: 80px;
            height: 80px;
            background: var(--brut-accent);
            border: 3px solid var(--brut-ink);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
            animation: brutGlitch 0.3s ease-out 0.2s both;
        }
        
        .brut-title {
            font-size: 64px;
            font-weight: 900;
            color: var(--brut-white);
            -webkit-text-stroke: 2px var(--brut-ink);
            text-shadow: 4px 4px 0 var(--brut-ink);
            letter-spacing: -2px;
            animation: brutShake 0.5s ease-out 0.4s both;
        }
        
        .brut-subtitle {
            font-family: monospace;
            font-size: 14px;
            font-weight: 700;
            color: var(--brut-ink);
            background: var(--brut-white);
            padding: 4px 12px;
            border: 2px solid var(--brut-ink);
            margin-top: 16px;
            transform: rotate(-2deg);
            animation: brutSlide 0.4s ease-out 0.7s both;
        }
        
        .brut-progress {
            margin-top: auto;
            margin-bottom: 48px;
            width: 200px;
            height: 16px;
            background: var(--brut-white);
            border: 3px solid var(--brut-ink);
            padding: 2px;
        }
        
        .brut-progress-bar {
            height: 100%;
            background: var(--brut-ink);
            animation: progressGrow 1s steps(8) 1s both;
        }
        
        /* ===== ANIMATIONS ===== */
        @keyframes progressGrow {
            from { width: 0; }
            to { width: 100%; }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes expandWidth {
            from { width: 0; opacity: 0; }
            to { width: 40px; opacity: 1; }
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes neonPulse {
            0%, 100% { box-shadow: 0 0 20px var(--neon-cyan), inset 0 0 20px rgba(0,255,255,0.1); }
            50% { box-shadow: 0 0 40px var(--neon-cyan), 0 0 60px var(--neon-cyan), inset 0 0 30px rgba(0,255,255,0.2); }
        }
        
        @keyframes neonFlicker {
            0%, 100% { opacity: 1; }
            5%, 10% { opacity: 0.8; }
            7%, 12% { opacity: 1; }
            50% { opacity: 0.9; }
        }
        
        @keyframes neonGridMove {
            from { background-position: 0 0; }
            to { background-position: 0 40px; }
        }
        
        @keyframes neonProgress {
            from { width: 0; }
            to { width: 60%; }
        }
        
        @keyframes fluidFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }
        
        @keyframes fluidIcon {
            from { transform: scale(0) rotate(-10deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        
        @keyframes fluidSlideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes brutGlitch {
            0% { transform: translate(0); }
            20% { transform: translate(-4px, 4px); }
            40% { transform: translate(4px, -4px); }
            60% { transform: translate(-2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        
        @keyframes brutShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-3px) rotate(-1deg); }
            75% { transform: translateX(3px) rotate(1deg); }
        }
        
        @keyframes brutSlide {
            from { transform: translateX(-50px) rotate(-5deg); opacity: 0; }
            to { transform: translateX(0) rotate(-2deg); opacity: 1; }
        }
        
        /* Tweaks Panel */
        .tweaks-panel {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            width: 280px;
            color: white;
            z-index: 1000;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        
        .tweaks-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
            opacity: 0.6;
        }
        
        .tweak-group {
            margin-bottom: 16px;
        }
        
        .tweak-label {
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 8px;
            opacity: 0.8;
        }
        
        .variant-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .variant-btn {
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .variant-btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.4);
        }
        
        .variant-btn.active {
            background: var(--y2k-pink);
            border-color: var(--y2k-pink);
            color: white;
        }
        
        .replay-btn {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 8px;
            border: 2px solid var(--y2k-lime);
            background: transparent;
            color: var(--y2k-lime);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .replay-btn:hover {
            background: var(--y2k-lime);
            color: var(--y2k-ink);
        }
        
        /* Label showing current variant */
        .variant-label {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            color: white;
            padding: 10px 24px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.15);
        }
        
        .variant-label span {
            color: var(--y2k-lime);
        }
        
        /* Show/hide logic */
        .splash-variant { display: none; }
        .splash-variant.active { display: flex; }
    </style>
</head>
<body>
    <div class="variant-label">Current: <span id="currentVariant">Y2K Storyboard</span></div>
    
    <div class="device-frame variant-y2k" id="deviceFrame">
        <div class="device-notch"></div>
        
        <!-- Y2K Variant -->
        <div class="splash-content splash-variant active" data-variant="y2k">
            <div class="y2k-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                </svg>
            </div>
            <div class="y2k-title" style="animation: fadeIn 0.6s ease-out 0.6s both, slideUp 0.6s ease-out 0.6s both;">灵犀</div>
            <div class="y2k-subtitle" style="animation: fadeIn 0.6s ease-out 1s both, slideUp 0.6s ease-out 1s both;">性格 · 匹配 · 测试</div>
            <div class="y2k-progress">
                <div class="y2k-progress-bar"></div>
            </div>
        </div>
        
        <!-- Minimal Variant -->
        <div class="splash-content splash-variant" data-variant="minimal">
            <div class="minimal-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px; opacity: 0.6;">
                    <circle cx="12" cy="12" r="10"></circle>
                    <path d="M12 16v-4M12 8h.01"></path>
                </svg>
            </div>
            <div class="minimal-title">灵犀</div>
            <div class="minimal-line"></div>
            <div class="minimal-subtitle">性格匹配测试</div>
            <div class="minimal-loader"></div>
        </div>
        
        <!-- Neon Variant -->
        <div class="splash-content splash-variant" data-variant="neon">
            <div class="neon-grid"></div>
            <div class="neon-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#00ffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                </svg>
            </div>
            <div class="neon-title">灵犀</div>
            <div class="neon-subtitle">PERSONALITY MATCH</div>
            <div class="neon-progress">
                <div class="neon-progress-bar"></div>
            </div>
        </div>
        
        <!-- Fluid Variant -->
        <div class="splash-content splash-variant" data-variant="fluid">
            <div class="fluid-bg-shape fluid-shape-1"></div>
            <div class="fluid-bg-shape fluid-shape-2"></div>
            <div class="fluid-bg-shape fluid-shape-3"></div>
            <div class="fluid-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 28px; height: 28px;">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                </svg>
            </div>
            <div class="fluid-title">灵犀</div>
            <div class="fluid-subtitle">发现彼此的灵魂共鸣</div>
            <div class="fluid-progress">
                <div class="fluid-progress-bar"></div>
            </div>
        </div>
        
        <!-- Brutalist Variant -->
        <div class="splash-content splash-variant" data-variant="brutalist">
            <div class="brut-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter" style="width: 40px; height: 40px;">
                    <rect x="3" y="3" width="18" height="18"></rect>
                    <path d="M9 9l6 6M15 9l-6 6"></path>
                </svg>
            </div>
            <div class="brut-title">灵犀</div>
            <div class="brut-subtitle">MATCHING TEST_v2.6</div>
            <div class="brut-progress">
                <div class="brut-progress-bar"></div>
            </div>
        </div>
    </div>
    
    <!-- Tweaks Panel -->
    <div class="tweaks-panel">
        <div class="tweaks-title">Tweaks</div>
        
        <div class="tweak-group">
            <div class="tweak-label">Variant Style</div>
            <div class="variant-options">
                <button class="variant-btn active" data-variant="y2k" onclick="switchVariant('y2k')">Y2K</button>
                <button class="variant-btn" data-variant="minimal" onclick="switchVariant('minimal')">Minimal</button>
                <button class="variant-btn" data-variant="neon" onclick="switchVariant('neon')">Neon</button>
                <button class="variant-btn" data-variant="fluid" onclick="switchVariant('fluid')">Fluid</button>
                <button class="variant-btn" data-variant="brutalist" onclick="switchVariant('brutalist')">Brutal</button>
            </div>
        </div>
        
        <button class="replay-btn" onclick="replayAnimation()">Replay Animation</button>
    </div>
    
    <style>
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
    
    <script>
        let currentVariant = 'y2k';
        const variantNames = {
            y2k: 'Y2K Storyboard',
            minimal: 'Minimal Zen',
            neon: 'Dark Neon',
            fluid: 'Fluid Organic',
            brutalist: 'Neo-Brutalist'
        };
        
        function switchVariant(variant) {
            currentVariant = variant;
            
            // Update device frame class
            const frame = document.getElementById('deviceFrame');
            frame.className = `device-frame variant-${variant}`;
            
            // Update active variant content
            document.querySelectorAll('.splash-variant').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelector(`.splash-variant[data-variant="${variant}"]`).classList.add('active');
            
            // Update button states
            document.querySelectorAll('.variant-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.variant === variant);
            });
            
            // Update label
            document.getElementById('currentVariant').textContent = variantNames[variant];
            
            // Replay animation
            replayAnimation();
        }
        
        function replayAnimation() {
            const frame = document.getElementById('deviceFrame');
            
            // Force reflow to restart animations
            frame.style.animation = 'none';
            frame.offsetHeight; // Trigger reflow
            frame.style.animation = '';
            
            // Clone and replace the active variant to restart CSS animations
            const activeVariant = document.querySelector('.splash-variant.active');
            const parent = activeVariant.parentNode;
            const clone = activeVariant.cloneNode(true);
            parent.replaceChild(clone, activeVariant);
            clone.classList.add('active');
        }
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            const variants = ['y2k', 'minimal', 'neon', 'fluid', 'brutalist'];
            const currentIndex = variants.indexOf(currentVariant);
            
            if (e.key === 'ArrowRight') {
                const nextIndex = (currentIndex + 1) % variants.length;
                switchVariant(variants[nextIndex]);
            } else if (e.key === 'ArrowLeft') {
                const prevIndex = (currentIndex - 1 + variants.length) % variants.length;
                switchVariant(variants[prevIndex]);
            } else if (e.key === ' ') {
                e.preventDefault();
                replayAnimation();
            }
        });
    </script>
</body>
</html>
